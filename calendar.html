  <style>
    :root {
      /* Match header.html .header-inner horizontal inset */
      --content-gutter: 10vw;
      --text-light: #f7f7f7;
      --text-dark: #1d1d1d;
      --mono: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', monospace;
      --header-height: 96px;
      --photo-size: clamp(77.4px, 8.505vw, 135.9px);
      --photo-gap: 16px;
    }

    html, body {
      height: 100vh;
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, 'SF Pro Text', 'SF Pro Display', system-ui,
        'Segoe UI', Roboto, 'Helvetica Neue', Arial;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: var(--text-light);
      color: var(--text-dark);
    }

    .page {
      width: 100%;
      height: 100vh;
      padding-top: var(--header-height);
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
    }

    .calendar-container {
      width: 100%;
      height: 380px;
      overflow-x: auto;
      overflow-y: hidden;
      position: relative;
      overscroll-behavior: contain;
      touch-action: pan-x;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .calendar-container::-webkit-scrollbar {
      display: none;
    }

    .calendar-track {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      width: max-content;
      min-width: 100%;
      padding: 44px var(--content-gutter) 0;
      box-sizing: border-box;
    }

    .month-section {
      display: block;
    }

    .month-heading-reveal {
      overflow: hidden;
      display: block;
      margin: 0 0 14px;
    }

    .month-heading {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 400;
      letter-spacing: -0.1em;
      color: var(--text-dark);
      margin: 0;
      line-height: 1;
      white-space: nowrap;
      text-transform: uppercase;
      transform: translateY(0);
    }

    body.calendar-page:not(.calendar-photos-ready) .calendar-track .month-heading-reveal .month-heading {
      transform: translateY(118%);
      transition: none;
    }

    body.calendar-page.calendar-photos-ready .calendar-track .month-heading-reveal .month-heading {
      transform: translateY(0);
    }

    body.calendar-page.calendar-photos-ready:not(.calendar-photos-complete) .calendar-track .month-heading-reveal .month-heading {
      transition-duration: 0.72s;
      transition-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
      transition-delay: var(--month-entrance-delay, 0ms);
    }

    .photo-grid {
      display: flex;
      align-items: flex-start;
      gap: var(--photo-gap);
    }

    .photo-item {
      flex: 0 0 auto;
      width: var(--photo-size);
      overflow: visible;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .photo-reveal {
      overflow: hidden;
      display: block;
      width: 100%;
    }

    .photo-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      transform: translateY(0);
    }

    body.calendar-page:not(.calendar-photos-ready) .calendar-track .photo-item .photo-reveal img {
      transform: translateY(118%);
      transition: none;
    }

    body.calendar-page.calendar-photos-ready .calendar-track .photo-item .photo-reveal img {
      transform: translateY(0);
    }

    body.calendar-page.calendar-photos-ready:not(.calendar-photos-complete) .calendar-track .photo-item .photo-reveal img {
      transition-duration: 0.72s;
      transition-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
      transition-delay: var(--photo-entrance-delay, 0ms);
    }

    .photo-item:hover {
      opacity: 0.72;
    }

    body.calendar-page.calendar-photos-ready .photo-item:hover img {
      transform: translateY(0) scale(1.06);
    }

    .detail-panel {
      position: fixed;
      left: var(--content-gutter);
      bottom: 9.5vh;
      right: var(--content-gutter);
      max-width: 420px;
      z-index: 10;
      pointer-events: none;
    }

    .detail-copy {
      padding-top: 2px;
      color: var(--text-dark);
      max-width: 420px;
    }

    .detail-copy-reveal {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 148px;
    }

    .detail-copy-stack {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 12px;
    }

    .detail-title {
      margin: 0;
      font-size: 20px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.08em;
      text-transform: uppercase;
    }

    .detail-body {
      margin: 0;
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: -0.06em;
      color: var(--text-dark);
      line-height: 1.5;
      text-transform: uppercase;
    }

    /* Responsive */
    @media (max-width: 680px) {
      :root {
        --header-height: 80px;
        --photo-size: 81px;
        --photo-gap: 12px;
      }

      .calendar-track {
        padding-left: var(--content-gutter);
        padding-right: var(--content-gutter);
      }

      .month-heading-reveal {
        margin-bottom: 10px;
      }

      .month-heading {
        font-size: 12px;
      }

      .detail-panel {
        bottom: 40px;
      }

      .detail-copy-reveal {
        min-height: 112px;
      }

      .detail-title {
        font-size: 17px;
      }

      .detail-body {
        font-size: 12px;
      }
    }

    /* ---------- Inline header styles (mirrors header.html) ----------
       Inlined so the header paints with the rest of the page on first
       paint — fetched headers cause a one-frame flash on transitions. */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      background: transparent;
      mix-blend-mode: exclusion;
      pointer-events: none;
    }
    header * { pointer-events: auto; }

    .header-inner {
      width: 100%;
      margin: 0 auto;
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 0 10vw;
    }

    .brand {
      display: flex;
      gap: 8px;
      align-items: baseline;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .brand .home {
      font-size: 21.6px;
      letter-spacing: -0.04em;
      font-weight: 400;
      color: var(--text-light);
      text-decoration: none;
    }

    .brand .plus {
      font-size: 21.6px;
      letter-spacing: -0.04em;
      font-weight: 400;
      color: var(--text-light);
      opacity: 0.9;
    }

    nav {
      display: flex;
      gap: 0;
      align-items: center;
      font-size: 21.6px;
      letter-spacing: -0.04em;
    }

    nav a {
      position: relative;
      font-weight: 400;
      text-decoration: none;
      color: var(--text-light);
      padding: 6px 0;
      display: inline-block;
    }

    .nav-sep {
      color: var(--text-light);
      opacity: 0.85;
      margin: 0 6px 0 2px;
      pointer-events: none;
      user-select: none;
    }

    header nav a:focus,
    header nav a:focus-visible { outline: none; }

    nav a.current { position: relative; }

    nav a.current::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 5px;
      height: 2px;
      background: var(--text-light);
      width: 100%;
      transform: none;
      transition: none;
    }

    nav a:not(.current)::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 5px;
      height: 2px;
      background: var(--text-light);
      width: 100%;
      transform: scaleX(0);
      transform-origin: right center;
      transition: transform 0.3s ease;
    }

    nav a:not(.current):hover::after {
      transform: scaleX(1);
      transform-origin: left center;
    }

    .page-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 21.6px;
      font-weight: 400;
      color: var(--text-light);
      opacity: 0.9;
      letter-spacing: -0.04em;
      text-align: center;
      transition: opacity 0.3s ease;
    }

    .page-title:hover { opacity: 1; }

    /* Clock styles (no live clock on this page, but page-transition.js
       builds an overlay clock clone here when navigating to Work). */
    .clock {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 21.6px;
      font-weight: 400;
      color: var(--text-light);

    .clock-time {

    }

    .clock-separator {
      opacity: 0.7;
      margin: 0 4px;
    }

    @media (max-width: 1100px) {
      .page-title { display: none; }
      .clock { display: none; }
    }

    @media (max-width: 680px) {

      .header-inner { padding: 0 10vw; }
      .brand .home { font-size: 3.6vw; }
      .brand .plus { font-size: 3.6vw; }
      nav { font-size: 3.6vw; }
      #mainNav a[data-section="Calendar"],
      #mainNav a[data-section="About"] + .nav-sep {
        display: none;
      }
    }

    a:focus { outline: none; }
    a:focus-visible { outline: none; }

    .homeunderline {
      text-decoration: none;
      color: var(--text-light);
    }
  </style>
</head>

  <script>
    (function initCalendarPhotoEntrance() {
      const track = document.querySelector('.calendar-track');
      if (!track) return;

      const items = Array.from(track.querySelectorAll('.photo-item'));
      const images = items.map((item) => item.querySelector('img')).filter(Boolean);
      if (!items.length || !images.length) return;

      const staggerMs = 60;
      const durationMs = 720;
      const totalMs = durationMs + (items.length - 1) * staggerMs;

      items.forEach((item, index) => {
        item.style.setProperty('--photo-entrance-delay', `${index * staggerMs}ms`);
      });

      document.querySelectorAll('.month-section').forEach((section) => {
        const firstPhoto = section.querySelector('.photo-item');
        const idx = firstPhoto ? items.indexOf(firstPhoto) : -1;
        if (idx >= 0) {
          section.style.setProperty('--month-entrance-delay', `${idx * staggerMs}ms`);
        }
      });

      function startEntrance() {
        document.body.classList.remove('calendar-photos-complete');
        document.body.classList.add('calendar-photos-ready');
        setTimeout(() => {
          document.body.classList.add('calendar-photos-complete');
        }, totalMs + 80);
      }

      function pageShown() {
        return new Promise((resolve) => {
          const html = document.documentElement;
          const check = () => {
            if (!html.classList.contains('pt-arriving') || html.classList.contains('pt-show')) {
              resolve();
              return true;
            }
            return false;
          };

          if (check()) return;
          const observer = new MutationObserver(() => {
            if (check()) observer.disconnect();
          });
          observer.observe(html, { attributes: true, attributeFilter: ['class'] });
          setTimeout(() => {
            observer.disconnect();
            resolve();
          }, 1200);
        });
      }

      function imagesDecoded() {
        return Promise.all(images.map((img) => {
          if (img.complete && img.naturalWidth > 0) return Promise.resolve();
          if (img.decode) return img.decode().catch(() => {});
          return new Promise((resolve) => {
            img.addEventListener('load', resolve, { once: true });
            img.addEventListener('error', resolve, { once: true });
          });
        }));
      }

      function loadingOverlayGone() {
        return new Promise((resolve) => {
          // loading-system.js registers after this script, so wait a tick
          // before deciding whether an overlay exists.
          setTimeout(() => {
            if (!document.getElementById('loading-overlay')) {
              resolve();
              return;
            }
            const observer = new MutationObserver(() => {
              if (!document.getElementById('loading-overlay')) {
                observer.disconnect();
                resolve();
              }
            });
            observer.observe(document.body, { childList: true });
            setTimeout(() => {
              observer.disconnect();
              resolve();
            }, 2600);
          }, 0);
        });
      }

      function domReady() {
        if (document.readyState !== 'loading') return Promise.resolve();
        return new Promise((resolve) => {
          document.addEventListener('DOMContentLoaded', resolve, { once: true });
        });
      }

      Promise.all([domReady(), pageShown(), imagesDecoded(), loadingOverlayGone()]).then(() => {
        requestAnimationFrame(() => {
          requestAnimationFrame(startEntrance);
        });
      });
    })();

    (function initCalendarPageTitleFromScroll() {
      const container = document.querySelector('.calendar-container');
      const pageTitle = document.getElementById('pageTitle');
      if (!container || !pageTitle) return;

      function syncTitleToLeftmostVisibleYear() {
        const cr = container.getBoundingClientRect();
        const hPad = 12;
        const leftProbe = cr.left + hPad;
        const rightProbe = cr.right - hPad;
        let bestSection = null;
        let bestLeft = Infinity;

        document.querySelectorAll('.month-section').forEach((section) => {
          const sr = section.getBoundingClientRect();
          if (sr.bottom <= cr.top || sr.top >= cr.bottom) return;
          if (sr.right <= leftProbe || sr.left >= rightProbe) return;
          if (sr.left < bestLeft) {
            bestLeft = sr.left;
            bestSection = section;
          }
        });

        const y = bestSection && bestSection.dataset.year;
        const label =
          y === '2025' ? 'My 2025'
          : y === '2026' ? 'My 2026'
          : '';

        if (label && pageTitle.textContent !== label) pageTitle.textContent = label;
      }

      let ticking = false;
      function scheduleSync() {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(() => {
          ticking = false;
          syncTitleToLeftmostVisibleYear();
        });
      }

      container.addEventListener('scroll', scheduleSync, { passive: true });
      window.addEventListener('resize', scheduleSync);
      if (typeof ResizeObserver !== 'undefined') {
        new ResizeObserver(scheduleSync).observe(container);
      }
      scheduleSync();
    })();

    const detailTitle = document.getElementById('detailTitle');
    const detailBody = document.getElementById('detailBody');

    function updateDetail(photoItem) {
      detailTitle.textContent = photoItem.dataset.title || '';
      detailBody.textContent = photoItem.dataset.caption || '';
    }

    function clearDetail() {
      detailTitle.textContent = '';
      detailBody.textContent = '';
    }

    document.querySelectorAll('.photo-item').forEach((photoItem) => {
      photoItem.addEventListener('mouseenter', () => updateDetail(photoItem));
      photoItem.addEventListener('focus', () => updateDetail(photoItem));
      photoItem.tabIndex = 0;
    });

    const calendarTrack = document.querySelector('.calendar-track');
    if (calendarTrack) {
      calendarTrack.addEventListener('mouseleave', clearDetail);
      calendarTrack.addEventListener(
        'focusout',
        (e) => {
          const next = e.relatedTarget;
          if (!next || !calendarTrack.contains(next)) clearDetail();
        },
        true
      );
    }

  </script>

  <!-- Loading System -->
  <!-- Smooth inertial lerp scrolling: adjust in smooth-scroll.js -->
  <script src="smooth-scroll.js"></script>
  <script src="loading-system.js"></script>
</body>
